<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <!--
    viewport: el celular usa su ancho real.
    Sin esto mobile lo muestra todo chiquito.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Tadeo cumple 1 año!</title>

  <!--
    Google Fonts cargadas antes del CSS para que estén
    disponibles cuando el navegador dibuja la página.
    Luckiest Guy → títulos caricaturescos
    Nunito       → cuerpo, redondeada y legible
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@400;700;900&display=swap"
    rel="stylesheet"
  />

  <!-- CSS en el head → se carga antes de mostrar contenido -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========================================================
    PANTALLA DE INTRO
    Cubre toda la pantalla al inicio. Tiene dos capas:
      1. Video del logo Vision Design
      2. Animación de Grizzy + Lemmings + Tadeo + botón entrar
    JS maneja la transición entre capas y hacia la invitación.
  ======================================================== -->
  <div id="intro">

    <!-- CAPA 1: Video del logo Vision Design -->
    <div id="intro-logo">
      <video id="video-logo" autoplay muted playsinline>
        <!--
          autoplay    → arranca solo al cargar
          muted       → obligatorio para autoplay en mobile
          playsinline → iOS no abre pantalla completa
        -->
        <source src="assets/intro-video.mp4" type="video/mp4" />
      </video>
    </div>

    <!--
      CAPA 2: Animación de personajes + botón entrar.
      Empieza oculta (display:none en CSS).
      JS la muestra cuando termina el video del logo.
    -->
    <div id="intro-personajes">

      <!--
        Tu animación con Grizzy, lemmings y Tadeo.
        GIF o WebP animado con fondo transparente.
        Reemplazá el src con el nombre de tu archivo.
      -->
      <div class="personajes-animacion">
       <video src="/assets/video-inicio.mp4" autoplay muted playsinline></video>
      </div>

      <!-- overlay que se oscurece para revelar el botón -->
  <div class="personajes-overlay" id="personajes-overlay"></div>

      <!--
        El botón aparece después de la animación.
        onclick llama a entrarInvitacion() en main.js.
        Este tap desbloquea el audio en iOS — muy importante.
      -->
      <button
        id="btn-entrar"
        class="btn-madera btn-entrar"
        onclick="entrarInvitacion()"
      >
        ¡Ver la invitación!
      </button>

    </div>

  </div><!-- fin #intro -->


  <!-- ========================================================
    INVITACIÓN PRINCIPAL
    Empieza invisible (opacity:0 en CSS).
    JS le agrega la clase .visible cuando el usuario
    toca el botón "Ver la invitación".
  ======================================================== -->
  <div id="invitacion">

    <!-- ── HERO + TARJETAS ───────────────────────────────────
      Una sola sección que contiene todo:
      el fondo de la serie cubre hero y tarjetas como un bloque.
      Arriba: el cartel de Tadeo flotando.
      Abajo: las tarjetas sticky que se superponen al scrollear.
    ──────────────────────────────────────────────────────── -->
    <section class="hero">

      <!-- Cartel "Mi primer añito" flotando arriba del todo -->
      <div class="hero-cartel">
        <div class="cartel">
          <img
            src="assets/img/cartel-primer-anito.png"
            alt="Tadeo - Mi primer añito"
          />
        </div>
      </div>

      <!-- ── TARJETAS STICKY ────────────────────────────────
        Contenedor de las tarjetas.
        Cada tarjeta tiene position:sticky en CSS →
        se queda pegada mientras scrolleás hasta que
        la siguiente la empuja hacia arriba.
        Los lemmings están absolutos a los costados,
        mitad afuera mitad adentro (z-index:3).
      ─────────────────────────────────────────────────────── -->
      <div class="tarjetas-container">

        <!-- TARJETA 1 — Datos del evento -->
        <div class="tarjeta tarjeta-datos">

          <!--
            Lemmings a los costados.
            position:absolute en CSS los ubica mitad afuera.
            left:-45px / right:-45px → mitad del ancho (90px/2).
            z-index:3 → por encima de la tarjeta.
            data-audio → el audio que suenan al tocarse.
          -->
          <img
            class="lemming-tarjeta lemming-izq lemming-interactivo"
            src="assets/img/lemming-pose-1.png"
            alt="Lemming"
            data-audio="assets/audio/tabodi-1.mp3"
          />
          <img
            class="lemming-tarjeta lemming-der lemming-interactivo"
            src="assets/img/lemming-pose-2.png"
            alt="Lemming"
            data-audio="assets/audio/risa-lemmings.mp3"
          />

          <div class="tarjeta-interior">

            <h2 class="tarjeta-titulo">¿Cuándo y dónde?</h2>

            <!--
              Cada fila tiene un lemming pequeño interactivo
              y el dato correspondiente.
            -->
            <div class="dato-fila">
              <img
                class="dato-lemming lemming-interactivo"
                src="assets/img/lemming-fecha.png"
                alt="Fecha"
                data-audio="assets/audio/tabodi-2.mp3"
              />
              <div class="dato-texto">
                <span class="dato-label">Fecha</span>
                <!-- Reemplazá con la fecha real -->
                <span class="dato-valor">Sábado 14 de Junio</span>
              </div>
            </div>

            <div class="dato-fila">
              <img
                class="dato-lemming lemming-interactivo"
                src="assets/img/lemming-hora.png"
                alt="Hora"
                data-audio="assets/audio/tabodi-1.mp3"
              />
              <div class="dato-texto">
                <span class="dato-label">Horario</span>
                <!-- Reemplazá con el horario real -->
                <span class="dato-valor">17:00 hs</span>
              </div>
            </div>

            <!--
              Botón ubicación → abre Google Maps.
              La dirección se configura en main.js → abrirMaps().
            -->
            <button
              class="btn-madera btn-ubicacion"
              onclick="abrirMaps()"
            >
              📍 Ver ubicación
            </button>

          </div>
        </div><!-- fin tarjeta-datos -->


        <!-- TARJETA 2 — RSVP -->
        <div class="tarjeta tarjeta-rsvp">

          <img
            class="lemming-tarjeta lemming-izq lemming-interactivo"
            src="assets/img/lemming-pose-3.png"
            alt="Lemming"
            data-audio="assets/audio/tabodi-2.mp3"
          />
          <img
            class="lemming-tarjeta lemming-der lemming-interactivo"
            src="assets/img/lemming-pose-4.png"
            alt="Lemming"
            data-audio="assets/audio/risa-lemmings.mp3"
          />

          <div class="tarjeta-interior">

            <h2 class="tarjeta-titulo">¿Venís?</h2>

            <!--
              Caricatura del bebé — al tocarla suena su risa.
              Usa la misma lógica que los lemmings (data-audio).
            -->
            <div class="bebe-container">
              <img
                id="caricatura-bebe"
                class="lemming-interactivo"
                src="assets/img/caricatura-bebe.png"
                alt="Tadeo"
                data-audio="assets/audio/risa-bebe.mp3"
              />
              <p class="bebe-texto">¡Tocame!</p>
            </div>

            <button
              class="btn-madera btn-rsvp"
              onclick="abrirRSVP()"
            >
              ¡Confirmá tu lugar!
            </button>

          </div>
        </div><!-- fin tarjeta-rsvp -->

      </div><!-- fin tarjetas-container -->

    </section><!-- fin hero -->


    <!-- ── MODAL RSVP ──────────────────────────────────────
      Ventana flotante que aparece al tocar "Confirmá tu lugar".
      Empieza oculto (display:none en CSS).
      JS le agrega .activo para mostrarlo.
      onclick en el overlay cierra si tocás afuera del modal.
    ─────────────────────────────────────────────────────── -->
    <div id="modal-rsvp" class="modal-overlay" onclick="cerrarRSVP(event)">
      <div class="modal-contenido">

        <!-- Botón X para cerrar -->
        <button class="modal-cerrar" onclick="cerrarRSVP()">&times;</button>

        <h3 class="modal-titulo">¡Confirmá tu asistencia!</h3>

        <!--
          onsubmit llama a enviarRSVP(event) en main.js.
          event.preventDefault() evita que recargue la página.
        -->
        <form id="form-rsvp" onsubmit="enviarRSVP(event)">

          <div class="campo">
            <label for="nombre">Tu nombre</label>
            <input
              type="text"
              id="nombre"
              placeholder="¿Cómo te llamás?"
              required
            />
          </div>

          <div class="campo">
            <label for="personas">¿Cuántos vienen?</label>
            <input
              type="number"
              id="personas"
              min="1"
              max="10"
              value="1"
              required
            />
          </div>

          <div class="campo">
            <label for="mensaje">Mensaje para Tadeo (opcional)</label>
            <textarea
              id="mensaje"
              placeholder="Un deseo para el cumpleañero..."
              rows="3"
            ></textarea>
          </div>

          <button type="submit" class="btn-madera btn-confirmar">
            ¡Vamos a la fiesta!
          </button>

        </form>

        <!-- Aparece después de enviar, oculto por defecto -->
        <div id="rsvp-exito" style="display:none;">
          <p class="rsvp-exito-texto">🐻 ¡Nos vemos en la fiesta!</p>
        </div>

      </div>
    </div>


    <!-- ── SECCIÓN FINAL ────────────────────────────────────
      El oso y los lemmings saludando.
      Aparece después de las tarjetas.
      IntersectionObserver en JS detecta cuando
      el usuario llega acá y dispara la animación de entrada.
    ─────────────────────────────────────────────────────── -->
    <div class="seccion-final">
      <!--
        La animación entra desde abajo cuando el usuario
        llega a esta sección. JS agrega la clase .visible
        via IntersectionObserver.
      -->
      <div class="animacion-final" id="animacion-final">
        <img
          src="assets/img/animacion-oso-saludo.gif"
          alt="Grizzy y los lemmings saludando"
        />
      </div>
    </div>


    <!-- ── FOOTER VISION DESIGN ────────────────────────────
      Presente en todos los proyectos de Vision Design.
    ─────────────────────────────────────────────────────── -->
    <footer>
      <div class="footer-contenido">

        <!--
          filter en CSS lo convierte a blanco automáticamente.
          No necesitás una versión blanca separada del logo.
        -->
        <img
          src="assets/img/vision-design-logo.png"
          alt="Vision Design"
          class="footer-logo"
        />

        <p class="footer-hecho">Invitación digital creada por</p>

        <a
          href="https://instagram.com/visiondesign_ok"
          target="_blank"
          rel="noopener"
          class="footer-instagram"
        >
          @visiondesign_ok
        </a>

        <p class="footer-cta">
          ¿Querés una invitación como esta? ¡Escribinos!
        </p>

      </div>
    </footer>

  </div><!-- fin #invitacion -->

  <!-- JS al final → todos los elementos HTML ya existen en el DOM -->
  <script src="main.js"></script>

</body>
</html>
